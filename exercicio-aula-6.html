<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Aula 6</title>
</head>

<body>


    <form action="" id="form" name="form">

        <h1>Formulário para Cadastro de Candidatos</h1>

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" required><br><br>


        <section id="materias">

            <h2>Para qual matéria você está se candidatando para lecionar:</h2>

            <input type="radio" id="matematica" name="materia" value="Matemática" required>
            <label for="matematica">Matemática</label><br>
            <input type="radio" id="portugues" name="materia" value="Português" required>
            <label for="portugues">Português</label><br>
            <input type="radio" id="biologia" name="materia" value="Bioligia" required>
            <label for="biologia">Bioligia</label><br>
            <input type="radio" id="ciencias" name="materia" value="Ciências" required>
            <label for="ciencias">Ciências</label><br>
            <input type="radio" id="historia" name="materia" value="História" required>
            <label for="historia">História</label><br>
            <input type="radio" id="geografia" name="materia" value="Geografia" required>
            <label for="geografia">Geografia</label><br>
            <input type="radio" id="artes" name="materia" value="Artes" required>
            <label for="artes">Artes</label><br><br>

        </section>

        <section id="turno">

            <h2>Turno. Escolha pelo menos um:</h2>


            <input type="checkbox" id="manha" name="turno" value="Manhã">
            <label for="manha">Manhã</label><br>
            <input type="checkbox" id="tarde" name="turno" value="Tarde">
            <label for="tarde">Tarde</label><br>
            <input type="checkbox" id="noite" name="turno" value="Noite">
            <label for="noite">Noite</label><br><br>


        </section>




        <h2>Nível de escolaridade</h2>

        <select id="escolaridade" name="escolaridade">
            <option value="Ensino Superior Completo">Ensino Superior Completo</option>
            <option value="Cursando Mestrado">Cursando Mestrado</option>
            <option value="Mestrado Completo">Mestrado Completo</option>
            <option value="Cursando Doutorado">Cursando Doutorado</option>
            <option value="Doutorado Completo">Doutorado Completo</option>
        </select>

        <h2>Descrição sobre si mesmo</h2>
        <textarea id="descricao" name="descricao" rows="4" cols="50" maxlength="200"></textarea><br><br>

        <input type="submit" value="Enviar">

    </form>

</body>

</html>
